<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ScooterMap 🛵</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0a0b11;
      --surface:#13141d;
      --surface2:#1b1c28;
      --surface3:#22233200;
      --border:rgba(255,255,255,0.07);
      --border-bright:rgba(255,255,255,0.15);
      --primary:#f59e0b;
      --primary-dim:rgba(245,158,11,0.12);
      --danger:#ef4444;
      --danger-dim:rgba(239,68,68,0.12);
      --green:#22c55e;
      --purple:#818cf8;
      --text:#eeeef5;
      --text-dim:rgba(238,238,245,0.45);
      --nav-h:68px;
    }
    html,body { height:100%; width:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased; }

    /* === MAP === */
    #map {
      position:absolute; inset:0; bottom:var(--nav-h); z-index:1;
      transition:bottom 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .leaflet-routing-container { display:none !important; }
    .leaflet-control-zoom { border:1px solid var(--border) !important; box-shadow:0 4px 16px rgba(0,0,0,0.4) !important; }
    .leaflet-control-zoom a { background:var(--surface) !important; color:var(--text) !important; border-bottom:1px solid var(--border) !important; }
    .leaflet-control-zoom a:hover { background:var(--surface2) !important; }
    .leaflet-popup-content-wrapper { background:var(--surface) !important; color:var(--text) !important; border:1px solid var(--border-bright) !important; box-shadow:0 8px 32px rgba(0,0,0,0.6) !important; border-radius:14px !important; padding:0 !important; }
    .leaflet-popup-content { margin:0 !important; }
    .leaflet-popup-tip-container { display:none; }
    .leaflet-popup-close-button { color:var(--text-dim) !important; font-size:18px !important; top:10px !important; right:12px !important; }

    /* === BOTTOM NAV === */
    #nav-bar {
      position:fixed; bottom:0; left:0; right:0; height:var(--nav-h);
      background:rgba(13,14,19,0.97); backdrop-filter:blur(24px);
      border-top:1px solid var(--border);
      display:flex; align-items:stretch; z-index:1000;
    }
    .nav-tab {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:5px; cursor:pointer; border:none; background:transparent;
      color:var(--text-dim); font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
      transition:color 0.2s; padding-bottom:2px;
    }
    .nav-tab.active { color:var(--primary); }
    .nav-tab svg { width:20px; height:20px; transition:transform 0.2s; }
    .nav-tab.active svg { transform:scale(1.1); }

    /* === FABs === */
    #fab-report {
      position:fixed; bottom:calc(var(--nav-h) + 14px); right:16px;
      width:54px; height:54px; background:var(--danger);
      border-radius:50%; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 24px rgba(239,68,68,0.45); z-index:900;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    #fab-report:active { transform:scale(0.9); box-shadow:0 2px 12px rgba(239,68,68,0.3); }
    #fab-report svg { width:22px; height:22px; color:white; }

    #fab-loc {
      position:fixed; bottom:calc(var(--nav-h) + 78px); right:16px;
      width:40px; height:40px;
      background:rgba(13,14,19,0.9); backdrop-filter:blur(12px);
      border-radius:50%; border:1px solid var(--border-bright); cursor:pointer;
      display:flex; align-items:center; justify-content:center; z-index:900;
      transition:transform 0.15s;
    }
    #fab-loc:active { transform:scale(0.9); }
    #fab-loc svg { width:17px; height:17px; color:var(--text); }

    /* === CLICK MODE BAR === */
    #click-bar {
      position:fixed; top:0; left:0; right:0;
      background:var(--danger); color:white;
      font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700;
      letter-spacing:0.5px; padding:12px 16px; z-index:2000;
      display:flex; align-items:center; justify-content:space-between;
      transform:translateY(-100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #click-bar.active { transform:translateY(0); }
    #click-bar button { background:rgba(255,255,255,0.2); border:none; color:white; padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; font-weight:600; }

    /* === PANELS === */
    .panel {
      position:fixed; left:0; right:0; bottom:var(--nav-h);
      max-height:min(75vh, calc(100vh - var(--nav-h) - 40px));
      background:var(--surface); border-radius:18px 18px 0 0;
      border-top:1px solid var(--border);
      overflow-y:auto; z-index:800;
      transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
      padding-bottom:28px;
    }
    .panel.open { transform:translateY(0); }
    .panel-drag { width:36px; height:4px; background:var(--border-bright); border-radius:2px; margin:12px auto 6px; }
    .panel-title {
      font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800;
      letter-spacing:1.5px; text-transform:uppercase; color:var(--text);
      padding:2px 18px 14px; display:flex; align-items:center; gap:8px;
    }
    .panel-title span { color:var(--primary); }

    /* === ROUTE PANEL === */
    .route-body { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
    .route-input-row { position:relative; }
    .route-dot { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:9px; height:9px; border-radius:50%; pointer-events:none; }
    .route-dot.from { background:var(--green); box-shadow:0 0 6px rgba(34,197,94,0.6); }
    .route-dot.to { background:var(--danger); box-shadow:0 0 6px rgba(239,68,68,0.6); }
    .rinput {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      border-radius:10px; padding:12px 12px 12px 32px; color:var(--text);
      font-family:'Barlow',sans-serif; font-size:15px; outline:none;
      transition:border-color 0.2s;
    }
    .rinput:focus { border-color:var(--primary); }
    .rinput::placeholder { color:var(--text-dim); }
    .route-calc-btn {
      width:100%; padding:13px; background:var(--primary); color:#000;
      border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif;
      font-size:16px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      cursor:pointer; margin-top:2px; transition:opacity 0.2s;
    }
    .route-calc-btn:active { opacity:0.82; }
    .route-clear-btn {
      width:100%; padding:10px; background:transparent; color:var(--text-dim);
      border:1px solid var(--border); border-radius:10px;
      font-family:'Barlow',sans-serif; font-size:14px; cursor:pointer;
    }

    #route-info { margin:14px 16px 0; padding:14px 16px; background:var(--surface2); border-radius:12px; border:1px solid var(--border); display:none; }
    #route-info.visible { display:block; }
    .ri-row { display:flex; gap:0; }
    .ri-stat { flex:1; text-align:center; padding:4px 0; }
    .ri-stat .val { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; color:var(--primary); }
    .ri-stat .lbl { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
    .ri-divider { width:1px; background:var(--border); align-self:stretch; margin:4px 0; }

    /* === MELDINGEN PANEL === */
    .melding-list { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
    .melding-card {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:12px; padding:13px 14px; cursor:pointer;
      transition:border-color 0.2s, background 0.2s; active:border-color:var(--danger);
    }
    .melding-card:active { background:rgba(239,68,68,0.05); border-color:rgba(239,68,68,0.3); }
    .mc-header { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .mc-badge {
      padding:3px 9px; border-radius:6px; font-family:'Barlow Condensed',sans-serif;
      font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
    }
    .mc-badge.rollerbank { background:var(--danger-dim); color:var(--danger); }
    .mc-badge.controle { background:var(--primary-dim); color:var(--primary); }
    .mc-badge.andere { background:rgba(129,140,248,0.12); color:var(--purple); }
    .mc-time { font-size:11px; color:var(--text-dim); margin-left:auto; }
    .mc-desc { font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .mc-loc { font-size:12px; color:var(--text-dim); }
    .mc-details { font-size:12px; color:var(--text-dim); margin-top:5px; padding-top:5px; border-top:1px solid var(--border); }
    .no-meld { text-align:center; color:var(--text-dim); padding:48px 24px; font-size:14px; line-height:1.7; }
    .meld-count { background:var(--danger); color:white; font-size:9px; font-weight:700; border-radius:9px; padding:1px 5px; margin-left:2px; }

    /* === MODAL === */
    #modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.75);
      z-index:3000; display:none; align-items:flex-end;
    }
    #modal-overlay.open { display:flex; }
    #modal {
      width:100%; background:var(--surface); border-radius:22px 22px 0 0;
      max-height:92vh; overflow-y:auto;
      animation:slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-handle { width:36px; height:4px; background:rgba(255,255,255,0.12); border-radius:2px; margin:12px auto 0; }
    .modal-header { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; letter-spacing:0.5px; }
    .modal-close { width:30px; height:30px; border-radius:50%; background:var(--surface2); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); }
    .form-body { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-dim); }
    .form-select, .form-input, .form-textarea {
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:12px 13px; color:var(--text); font-family:'Barlow',sans-serif;
      font-size:15px; outline:none; width:100%; transition:border-color 0.2s;
      -webkit-appearance:none;
    }
    .form-select:focus, .form-input:focus, .form-textarea:focus { border-color:var(--primary); }
    .form-textarea { resize:none; min-height:76px; }
    .form-input::placeholder, .form-textarea::placeholder { color:var(--text-dim); }
    .loc-chip {
      display:flex; align-items:center; gap:8px; padding:11px 13px;
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      font-size:13px; color:var(--text-dim); font-family:'Barlow',sans-serif;
      min-height:44px;
    }
    .loc-chip svg { flex-shrink:0; opacity:0.6; }
    .submit-btn {
      width:100%; padding:14px; background:var(--danger); color:white;
      border:none; border-radius:12px; font-family:'Barlow Condensed',sans-serif;
      font-size:17px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      cursor:pointer; box-shadow:0 4px 20px rgba(239,68,68,0.3); transition:opacity 0.2s;
    }
    .submit-btn:active { opacity:0.82; }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .anon-note { text-align:center; font-size:11px; color:var(--text-dim); margin-top:-4px; }

    /* === POPUP === */
    .popup-inner { padding:13px 15px; min-width:180px; }
    .popup-type { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
    .popup-type.rollerbank { color:var(--danger); }
    .popup-type.controle { color:var(--primary); }
    .popup-type.andere { color:var(--purple); }
    .popup-desc { font-size:14px; font-weight:500; color:var(--text); margin-bottom:5px; line-height:1.3; }
    .popup-meta { font-size:11px; color:var(--text-dim); line-height:1.7; }
    .popup-details { font-size:12px; color:var(--text-dim); margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }

    /* === TOAST === */
    #toast {
      position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-80px);
      background:var(--surface); border:1px solid var(--border-bright); border-radius:10px;
      padding:11px 18px; font-size:13px; font-weight:500; z-index:9999;
      white-space:nowrap; transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
      box-shadow:0 8px 28px rgba(0,0,0,0.5); pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.success { border-color:rgba(34,197,94,0.4); color:var(--green); }
    #toast.error { border-color:rgba(239,68,68,0.4); color:var(--danger); }

    /* === SPINNER === */
    .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:_spin 0.5s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes _spin { to { transform:rotate(360deg); } }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>
<body>

<!-- Click mode indicator -->
<div id="click-bar">
  <span>🚨 Tik op de kaart voor de locatie</span>
  <button onclick="cancelClick()">Annuleer</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- FAB Report -->
<button id="fab-report" onclick="startReport()" title="Melding toevoegen">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
</button>

<!-- FAB Location -->
<button id="fab-loc" onclick="goToLoc()" title="Mijn locatie">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/>
  </svg>
</button>

<!-- Bottom Nav -->
<nav id="nav-bar">
  <button class="nav-tab active" id="tab-map" onclick="switchTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </svg>
    Kaart
  </button>
  <button class="nav-tab" id="tab-route" onclick="switchTab('route')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12h4l3-9 4 18 3-9h4"/>
    </svg>
    Route
  </button>
  <button class="nav-tab" id="tab-meldingen" onclick="switchTab('meldingen')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    Meldingen
  </button>
</nav>

<!-- Route Panel -->
<div class="panel" id="panel-route">
  <div class="panel-drag"></div>
  <div class="panel-title">🛵 Route plannen</div>
  <div class="route-body">
    <div class="route-input-row">
      <div class="route-dot from"></div>
      <input type="text" class="rinput" id="from-input" placeholder="Vertrekpunt...">
    </div>
    <div class="route-input-row">
      <div class="route-dot to"></div>
      <input type="text" class="rinput" id="to-input" placeholder="Bestemming...">
    </div>
    <button class="route-calc-btn" id="route-btn" onclick="planRoute()">Route berekenen</button>
    <button class="route-clear-btn" onclick="clearRoute()">Route wissen</button>
  </div>
  <div id="route-info">
    <div class="ri-row">
      <div class="ri-stat">
        <div class="val" id="route-dist">–</div>
        <div class="lbl">Afstand</div>
      </div>
      <div class="ri-divider"></div>
      <div class="ri-stat">
        <div class="val" id="route-time">–</div>
        <div class="lbl">Reistijd</div>
      </div>
    </div>
  </div>
</div>

<!-- Meldingen Panel -->
<div class="panel" id="panel-meldingen">
  <div class="panel-drag"></div>
  <div class="panel-title">🚔 Meldingen <span id="meld-cnt"></span></div>
  <div class="melding-list" id="melding-list">
    <div class="no-meld">Nog geen meldingen.<br>Tik op 🚨 om de eerste te plaatsen.</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal: Add Report -->
<div id="modal-overlay" onclick="modalOutsideClick(event)">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">🚨 Melding toevoegen</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Type controle</label>
        <select class="form-select" id="r-type">
          <option value="rollerbank">🚔 Rollerbank / Snelheidscontrole</option>
          <option value="controle">👮 Politiecontrole (algemeen)</option>
          <option value="andere">⚠️ Andere melding</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Locatie</label>
        <div class="loc-chip" id="loc-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21C12 21 5 14 5 10a7 7 0 0114 0c0 4-7 11-7 11z"/></svg>
          <span id="loc-text">Locatie ophalen...</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Omschrijving</label>
        <input type="text" class="form-input" id="r-desc" placeholder="bijv. Rollerbank op de N325 richting Arnhem">
      </div>
      <div class="form-group">
        <label class="form-label">Extra details <span style="color:var(--text-dim);font-size:10px;font-weight:400;letter-spacing:0;">(optioneel)</span></label>
        <textarea class="form-textarea" id="r-details" placeholder="Richting, hoeveel agenten, soort voertuig, bijv. grijze politiebusje..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Datum & tijd</label>
        <input type="datetime-local" class="form-input" id="r-time">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitReport()">Melding plaatsen</button>
      <div class="anon-note">🔒 Anoniem verzonden via FormSubmit</div>
    </div>
  </div>
</div>

<script>
// ================================================================
// CONFIG — ⚙️ VUL JOUW FORMSUBMIT EMAIL IN
// ================================================================
const FORMSUBMIT_EMAIL = 'jouwemail@example.com'; // ← AANPASSEN
const STORAGE_KEY = 'scootermap_v2_reports';

// ================================================================
// STATE
// ================================================================
let map, routeControl;
let reports = [];
let markers = [];
let pendingLat = null, pendingLng = null;
let clickMode = false;

// ================================================================
// MAP INIT
// ================================================================
function initMap() {
  map = L.map('map', {
    center: [52.15, 5.38],
    zoom: 8,
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

  L.control.attribution({ prefix: '© OSM © CARTO', position: 'bottomleft' }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  startLiveLocation();

  map.on('click', e => {
    if (!clickMode) return;
    setReportLocation(e.latlng.lat, e.latlng.lng);
    cancelClick();
    openModal();
  });


}

// ================================================================
// LIVE LOCATION
// ================================================================
let userMarker = null, userCircle = null, watchId = null, followMode = true;

function startLiveLocation() {
  if (!navigator.geolocation) return;
  watchId = navigator.geolocation.watchPosition(onPos, onPosErr, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 10000
  });
  map.on('dragstart', () => { followMode = false; updateFabLoc(); });
}

function onPos(p) {
  const { latitude: lat, longitude: lng, accuracy } = p.coords;
  const latlng = [lat, lng];

  if (!userMarker) {
    // First fix → zoom in
    map.setView(latlng, 15);

    userCircle = L.circle(latlng, {
      radius: accuracy, color: '#3b82f6', fillColor: '#3b82f6',
      fillOpacity: 0.12, weight: 1.5, opacity: 0.5
    }).addTo(map);

    const dot = L.divIcon({
      className: '',
      html: `<div style="width:20px;height:20px;border-radius:50%;background:#3b82f6;
             border:3px solid white;box-shadow:0 2px 10px rgba(59,130,246,0.7);
             animation:pulse 2s ease-in-out infinite;"></div>
             <style>@keyframes pulse{0%,100%{box-shadow:0 2px 10px rgba(59,130,246,0.7),0 0 0 0 rgba(59,130,246,0.4)}50%{box-shadow:0 2px 10px rgba(59,130,246,0.7),0 0 0 10px rgba(59,130,246,0)}}</style>`,
      iconSize: [20, 20], iconAnchor: [10, 10]
    });
    userMarker = L.marker(latlng, { icon: dot, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
    userCircle.setLatLng(latlng).setRadius(accuracy);
    if (followMode) map.panTo(latlng, { animate: true, duration: 0.5 });
  }
}

function onPosErr() { toast('Kan locatie niet ophalen', 'error'); }

function updateFabLoc() {
  const fab = document.getElementById('fab-loc');
  fab.style.borderColor = followMode ? '#3b82f6' : 'var(--border-bright)';
}

function goToLoc() {
  followMode = true;
  updateFabLoc();
  if (userMarker) {
    map.flyTo(userMarker.getLatLng(), 16, { duration: 0.8 });
  } else {
    navigator.geolocation?.getCurrentPosition(
      p => map.flyTo([p.coords.latitude, p.coords.longitude], 15),
      () => toast('Kan locatie niet ophalen', 'error')
    );
  }
}

// ================================================================
// CLICK MODE
// ================================================================
function startReport() {
  clickMode = true;
  document.getElementById('click-bar').classList.add('active');
  switchTab('map');
  toast('Tik op de kaart om locatie te kiezen');
}

function cancelClick() {
  clickMode = false;
  document.getElementById('click-bar').classList.remove('active');
}

// ================================================================
// REVERSE GEOCODE
// ================================================================
async function revGeocode(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
      headers: { 'Accept-Language': 'nl' }
    });
    const d = await r.json();
    const a = d.address || {};
    const road = a.road || a.pedestrian || a.path || '';
    const city = a.city || a.town || a.village || a.municipality || a.suburb || '';
    return [road, city].filter(Boolean).join(', ') || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  } catch {
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

// ================================================================
// STORAGE
// ================================================================
async function loadReports() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    if (r && r.value) {
      reports = JSON.parse(r.value);
    }
  } catch {
    reports = [];
  }
  renderMarkers();
  renderList();
}

async function saveReports() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(reports), true);
  } catch(e) {
    console.warn('Storage save failed:', e);
  }
}

// ================================================================
// MARKERS
// ================================================================
function makeIcon(type) {
  const emoji = type === 'rollerbank' ? '🚔' : type === 'controle' ? '👮' : '⚠️';
  const color = type === 'rollerbank' ? '#ef4444' : type === 'controle' ? '#f59e0b' : '#818cf8';
  return L.divIcon({
    className: '',
    html: `<div style="width:38px;height:38px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 14px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.25);">${emoji}</div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19],
    popupAnchor: [0, -22]
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  reports.forEach(r => {
    const typeLabel = r.type === 'rollerbank' ? 'ROLLERBANK' : r.type === 'controle' ? 'POLITIECONTROLE' : 'MELDING';
    const timeStr = new Date(r.time).toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
    const popup = `<div class="popup-inner">
      <div class="popup-type ${r.type}">${typeLabel}</div>
      <div class="popup-desc">${r.description || 'Geen omschrijving'}</div>
      <div class="popup-meta">📍 ${r.loc || `${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}`}<br>🕐 ${timeStr}</div>
      ${r.details ? `<div class="popup-details">${r.details}</div>` : ''}
    </div>`;
    const m = L.marker([r.lat, r.lng], { icon: makeIcon(r.type) }).bindPopup(popup, { maxWidth: 260, minWidth: 180 });
    m.addTo(map);
    markers.push(m);
  });
}

// ================================================================
// MELDINGEN LIST
// ================================================================
function renderList() {
  const el = document.getElementById('melding-list');
  const cnt = document.getElementById('meld-cnt');

  if (!reports.length) {
    el.innerHTML = `<div class="no-meld">Nog geen meldingen.<br>Tik op 🚨 om de eerste te plaatsen.</div>`;
    cnt.textContent = '';
    return;
  }

  cnt.innerHTML = `<span class="meld-count">${reports.length}</span>`;

  const sorted = [...reports].sort((a, b) => new Date(b.time) - new Date(a.time));
  el.innerHTML = sorted.map(r => {
    const label = r.type === 'rollerbank' ? '🚔 Rollerbank' : r.type === 'controle' ? '👮 Controle' : '⚠️ Andere';
    const timeStr = new Date(r.time).toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<div class="melding-card" onclick="zoomTo(${r.lat},${r.lng})">
      <div class="mc-header">
        <span class="mc-badge ${r.type}">${label}</span>
        <span class="mc-time">${timeStr}</span>
      </div>
      <div class="mc-desc">${r.description || 'Geen omschrijving'}</div>
      <div class="mc-loc">📍 ${r.loc || `${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}`}</div>
      ${r.details ? `<div class="mc-details">${r.details}</div>` : ''}
    </div>`;
  }).join('');
}

function zoomTo(lat, lng) {
  switchTab('map');
  map.flyTo([lat, lng], 16, { duration: 0.8 });
  // open popup for that marker
  setTimeout(() => {
    const m = markers.find(mk => Math.abs(mk.getLatLng().lat - lat) < 0.0001);
    if (m) m.openPopup();
  }, 900);
}

// ================================================================
// ADD REPORT MODAL
// ================================================================
function setReportLocation(lat, lng) {
  pendingLat = lat;
  pendingLng = lng;
  document.getElementById('loc-text').textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  revGeocode(lat, lng).then(name => {
    document.getElementById('loc-text').textContent = name;
  });
}

function openModal() {
  // Set default time to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('r-time').value = now.toISOString().slice(0, 16);
  document.getElementById('r-desc').value = '';
  document.getElementById('r-details').value = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function modalOutsideClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ================================================================
// SUBMIT REPORT
// ================================================================
async function submitReport() {
  if (!pendingLat || !pendingLng) {
    toast('Kies eerst een locatie', 'error'); return;
  }
  const desc = document.getElementById('r-desc').value.trim();
  if (!desc) {
    toast('Voeg een omschrijving toe', 'error');
    document.getElementById('r-desc').focus(); return;
  }

  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '<span class="spin"></span>Versturen...';
  btn.disabled = true;

  const type = document.getElementById('r-type').value;
  const details = document.getElementById('r-details').value.trim();
  const timeVal = document.getElementById('r-time').value;
  const timeISO = timeVal ? new Date(timeVal).toISOString() : new Date().toISOString();
  const locName = document.getElementById('loc-text').textContent;

  const report = {
    id: Date.now(),
    lat: pendingLat,
    lng: pendingLng,
    type, description: desc,
    details, time: timeISO,
    loc: locName
  };

  reports.push(report);
  await saveReports();
  renderMarkers();
  renderList();

  // FormSubmit (non-blocking)
  fetch(`https://formsubmit.co/ajax/${FORMSUBMIT_EMAIL}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      _subject: `🚨 ScooterMap: ${type.toUpperCase()} — ${locName}`,
      Type: type === 'rollerbank' ? 'Rollerbank / Snelheidscontrole' : type === 'controle' ? 'Politiecontrole' : 'Andere melding',
      Omschrijving: desc,
      Locatie: locName,
      Coördinaten: `${pendingLat.toFixed(6)}, ${pendingLng.toFixed(6)}`,
      Tijd: new Date(timeISO).toLocaleString('nl-NL'),
      Details: details || '—',
      _captcha: 'false'
    })
  }).catch(() => {});

  btn.innerHTML = 'Melding plaatsen';
  btn.disabled = false;
  closeModal();
  pendingLat = null; pendingLng = null;

  map.flyTo([report.lat, report.lng], 15, { duration: 0.8 });
  toast('✅ Melding toegevoegd!', 'success');
}

// ================================================================
// ROUTING
// ================================================================
async function geocode(q) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=nl,be`, {
    headers: { 'Accept-Language': 'nl' }
  });
  const d = await r.json();
  if (!d.length) throw new Error(`"${q}" niet gevonden`);
  return L.latLng(+d[0].lat, +d[0].lon);
}

async function planRoute() {
  const f = document.getElementById('from-input').value.trim();
  const t = document.getElementById('to-input').value.trim();
  if (!f || !t) { toast('Vul vertrek en bestemming in', 'error'); return; }

  const btn = document.getElementById('route-btn');
  btn.innerHTML = '<span class="spin"></span>Berekenen...';
  btn.disabled = true;

  try {
    const [from, to] = await Promise.all([geocode(f), geocode(t)]);
    if (routeControl) map.removeControl(routeControl);

    routeControl = L.Routing.control({
      waypoints: [from, to],
      router: L.Routing.osrmv1({
        serviceUrl: 'https://router.project-osrm.org/route/v1',
        profile: 'car'
      }),
      routeWhileDragging: false,
      showAlternatives: false,
      fitSelectedRoutes: true,
      lineOptions: {
        styles: [{ color: '#f59e0b', weight: 5, opacity: 0.9 }],
        extendToWaypoints: true,
        missingRouteTolerance: 0
      },
      createMarker: (i, wp) => L.marker(wp.latLng, {
        icon: L.divIcon({
          className: '',
          html: `<div style="width:13px;height:13px;border-radius:50%;background:${i === 0 ? '#22c55e' : '#ef4444'};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
          iconSize: [13, 13], iconAnchor: [6.5, 6.5]
        })
      })
    }).addTo(map);

    routeControl.on('routesfound', e => {
      const s = e.routes[0].summary;
      const km = s.totalDistance / 1000;
      const min = Math.round(s.totalTime / 60);
      document.getElementById('route-dist').textContent = km >= 1 ? km.toFixed(1) + ' km' : Math.round(s.totalDistance) + ' m';
      document.getElementById('route-time').textContent = min >= 60 ? Math.floor(min/60) + 'u ' + (min%60) + 'min' : min + ' min';
      document.getElementById('route-info').classList.add('visible');
    });

    routeControl.on('routingerror', () => toast('Route niet gevonden', 'error'));
    switchTab('map');

  } catch(e) {
    toast(e.message || 'Fout bij berekenen', 'error');
  }

  btn.innerHTML = 'Route berekenen';
  btn.disabled = false;
}

function clearRoute() {
  if (routeControl) { map.removeControl(routeControl); routeControl = null; }
  document.getElementById('route-info').classList.remove('visible');
  document.getElementById('from-input').value = '';
  document.getElementById('to-input').value = '';
}

// ================================================================
// TAB NAV
// ================================================================
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  if (tab !== 'map') {
    document.getElementById(`panel-${tab}`).classList.add('open');
  }
  setTimeout(() => map.invalidateSize(), 360);
}

// ================================================================
// TOAST
// ================================================================
let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = type; }, 2800);
}

// ================================================================
// BOOT
// ================================================================
initMap();
loadReports();
</script>
